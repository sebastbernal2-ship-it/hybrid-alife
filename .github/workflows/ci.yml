name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs of this workflow for the same ref. Saves CI minutes
# when a branch is updated rapidly during iteration.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Hard ceiling so a hung JAX compile / runaway test can't burn the day.
    timeout-minutes: 20
    strategy:
      # Report failures from every Python version even if one fails first.
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          # Built-in pip cache keyed on the resolved dependency set.
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Show environment
        run: |
          python --version
          pip list

      - name: Lint
        run: |
          ruff check src tests || true

      - name: Run tests
        # -q for compactness; --durations surfaces slow tests when CI feels sluggish.
        run: |
          pytest -q --durations=10
