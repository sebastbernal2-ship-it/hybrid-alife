seed: 7
run_name: transfer_source
output_dir: outputs/runs

world:
  width: 16
  height: 16
  toroidal: true
  resource_channels: 2
  hazard_channels: 1
  max_agents: 8
  max_digital_organisms: 16
  flow_noise_std: 0.03
  concentration_decay: 0.97
  concentration_diffusion: 0.08

embodied:
  enabled: true
  population_size: 8
  obs_radius: 2
  hidden_size: 10
  message_size: 4
  genome_mutation_std: 0.02
  genome_mutation_prob: 0.05
  initial_energy: 20.0
  reproduce_energy_threshold: 30.0
  reproduction_energy_cost: 15.0
  basal_metabolic_cost: 0.05

avida:
  enabled: true
  population_size: 8
  genome_length: 16
  max_genome_length: 32
  registers: 4
  memory_size: 8
  cycles_per_update: 4
  point_mutation_prob: 0.0025
  insertion_prob: 0.0005
  deletion_prob: 0.0005

evolution:
  generations: 10
  steps_per_generation: 2
  elite_fraction: 0.1
  tournament_size: 3
  extinction_min_population: 2
  novelty_enabled: true
  map_elites_enabled: true
  map_elites_bins: 4
  novelty_k: 3
  novelty_archive_size: 64

logging:
  metrics_every: 2
  checkpoint_every_generations: 100
  replay_every_generations: 1
