seed: 7
run_name: smoke200
output_dir: outputs/runs

world:
  width: 20
  height: 20
  toroidal: true
  resource_channels: 3
  hazard_channels: 2
  max_agents: 12
  max_digital_organisms: 24
  flow_noise_std: 0.03
  concentration_decay: 0.97
  concentration_diffusion: 0.08

embodied:
  enabled: true
  population_size: 10
  obs_radius: 2
  hidden_size: 12
  message_size: 4
  genome_mutation_std: 0.02
  genome_mutation_prob: 0.05
  initial_energy: 20.0
  reproduce_energy_threshold: 30.0
  reproduction_energy_cost: 15.0
  basal_metabolic_cost: 0.05

avida:
  enabled: true
  population_size: 12
  genome_length: 20
  max_genome_length: 48
  registers: 4
  memory_size: 8
  cycles_per_update: 4
  point_mutation_prob: 0.0025
  insertion_prob: 0.0005
  deletion_prob: 0.0005

evolution:
  generations: 200
  steps_per_generation: 4
  elite_fraction: 0.05
  tournament_size: 3
  extinction_min_population: 3
  novelty_enabled: true
  map_elites_enabled: true
  map_elites_bins: 6
  novelty_k: 5
  novelty_archive_size: 256

logging:
  metrics_every: 4
  checkpoint_every_generations: 50
  replay_every_generations: 1
