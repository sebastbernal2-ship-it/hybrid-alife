seed: 7
run_name: ablation_curvature_serpentine
output_dir: outputs/runs

world:
  width: 24
  height: 24
  toroidal: true
  resource_channels: 3
  hazard_channels: 2
  max_agents: 16
  max_digital_organisms: 32
  flow_noise_std: 0.03
  concentration_decay: 0.97
  concentration_diffusion: 0.08
  curvature_regime: serpentine
  curvature_wavenumber: 3.0
  curvature_amplitude: 1.0
  dean_secondary_strength: 0.4
  flow_advection_strength: 0.3

embodied:
  enabled: true
  population_size: 12
  obs_radius: 2
  hidden_size: 16
  message_size: 4
  genome_mutation_std: 0.02
  genome_mutation_prob: 0.05
  initial_energy: 20.0
  reproduce_energy_threshold: 40.0
  reproduction_energy_cost: 18.0
  basal_metabolic_cost: 0.05
  true_sixth_sense: true

avida:
  enabled: true
  population_size: 16
  genome_length: 24
  max_genome_length: 64
  registers: 4
  memory_size: 8
  cycles_per_update: 6
  point_mutation_prob: 0.0025
  insertion_prob: 0.0005
  deletion_prob: 0.0005

evolution:
  generations: 4
  steps_per_generation: 6
  elite_fraction: 0.05
  tournament_size: 3
  extinction_min_population: 3
  novelty_enabled: false

logging:
  metrics_every: 2
  checkpoint_every_generations: 5
  replay_every_generations: 1
