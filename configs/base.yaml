seed: 7
run_name: smoke_hybrid_v1
output_dir: outputs/runs

world:
  width: 32
  height: 32
  toroidal: true
  resource_channels: 3
  hazard_channels: 2
  max_agents: 32
  max_digital_organisms: 64
  flow_noise_std: 0.03
  concentration_decay: 0.97
  concentration_diffusion: 0.08

embodied:
  enabled: true
  population_size: 16
  obs_radius: 3
  hidden_size: 32
  message_size: 8
  genome_mutation_std: 0.02
  genome_mutation_prob: 0.05
  initial_energy: 20.0
  reproduce_energy_threshold: 40.0
  reproduction_energy_cost: 18.0
  basal_metabolic_cost: 0.05

avida:
  enabled: true
  population_size: 32
  genome_length: 32
  max_genome_length: 128
  registers: 4
  memory_size: 16
  cycles_per_update: 8
  point_mutation_prob: 0.0025
  insertion_prob: 0.0005
  deletion_prob: 0.0005

evolution:
  generations: 2
  steps_per_generation: 8
  elite_fraction: 0.05
  tournament_size: 4
  extinction_min_population: 4
  novelty_enabled: false

logging:
  metrics_every: 2
  checkpoint_every_generations: 5
  replay_every_generations: 1
